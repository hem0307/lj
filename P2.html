<!-- write json string with date property and bring data in ist while clicking on button  -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function call()
        {
            text=`{"name":"ABC","AGE":18,"DOB":"2005-06-25"}`
            obj=JSON.parse(text)
            obj.DOB=new Date(obj.DOB)
            document.getElementById("demo").innerHTML="Birth day of"+obj.name+"is"+obj.DOB
        }
    </script>
 </head>
 <body>
    <p id="demo"></p>
    <button onclick="call()">Click me</button>
 </body>
 </html>
